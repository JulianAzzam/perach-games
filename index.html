<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ألعاب بيراح التعليمية</title>
  <style>
    :root {
      --bg1: #f7f0df;
      --bg2: #d5ecff;
      --ink: #0f172a;
      --panel: rgba(255, 255, 255, 0.82);
      --accent: #0284c7;
      --accent-hover: #0369a1;
      --shadow: 0 12px 26px rgba(15, 23, 42, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 80% 10%, #bfdbfe 0%, transparent 35%),
        radial-gradient(circle at 10% 90%, #fde68a 0%, transparent 35%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .panel {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 0 0 10px;
      text-align: center;
      font-size: clamp(1.6rem, 2.5vw, 2.2rem);
    }

    p {
      margin: 0 0 20px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }

    .game-link {
      text-decoration: none;
      background: #ffffff;
      color: var(--ink);
      border: 1px solid rgba(15, 23, 42, 0.12);
      border-radius: 14px;
      padding: 16px;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .game-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(15, 23, 42, 0.12);
      border-color: rgba(2, 132, 199, 0.42);
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .btn {
      margin-top: 12px;
      border: none;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>ألعاب بيراح التعليمية</h1>
    <p>اختاروا اللعبة التي تريدون تشغيلها.</p>

    <section class="grid">
      <a class="game-link" href="math.html">لعبة الرياضيات</a>
      <a class="game-link" href="matching.html">لعبة المطابقة</a>
      <a class="game-link" href="charades.html">لعبة الشاريدز</a>
    </section>

    <div class="footer">
      <button class="btn" id="reloadBtn" type="button">تحديث الصفحة</button>
    </div>
  </main>

  <script>
    document.getElementById("reloadBtn").addEventListener("click", () => {
      location.reload();
    });
  </script>
</body>
</html>
